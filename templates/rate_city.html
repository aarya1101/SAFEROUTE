{% extends 'citizen_home.html' %}
{% block content %}

{% if messages %}
    {% for message in messages %}
        <div style="max-width: 600px; margin: 0 auto 24px; padding: 16px 20px; border-radius: 12px; background: var(--orange-lt); border: 1.5px solid var(--orange); color: var(--orange-dk); font-family: var(--font-mono) !important; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 12px rgba(255, 107, 53, 0.1); animation: contentIn 0.38s ease forwards;">
            <i class="fas fa-check-circle" style="font-size: 1rem;"></i>
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="pred-header" style="margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">
    <div class="pred-eyebrow" style="font-family: var(--font-mono) !important; font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
        Community Feedback
    </div>
    <div class="pred-title" style="font-weight: 700; font-size: 3.2rem; color: var(--ink); letter-spacing: -1.5px; line-height: 1; margin-bottom: 8px;">
        Rate a City
    </div>
    <div class="pred-sub" style="font-weight: 300; font-size: 0.95rem; color: var(--muted); line-height: 1.7;">
        Share your personal safety experience to help other travelers stay informed.
    </div>
</div>

<div class="rating-container" style="max-width: 600px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 16px; border: 1.5px solid var(--border); box-shadow: 0 12px 32px rgba(255, 107, 53, 0.05);">
    
    <form method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 24px;">
            <label style="display: block; font-family: var(--font-mono) !important; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;">
                Select District Registry
            </label>
            <select name="district" required style="width: 100%; padding: 14px 18px; font-family: var(--font-main) !important; font-size: 0.85rem; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--ink); outline: none; appearance: none;">
                <option value="" disabled selected>-- Choose a District --</option>
                {% for district in districts %}
                    <option value="{{ district }}">{{ district }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-family: var(--font-mono) !important; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;">
                Safety Rating
            </label>
            <div class="star-rating" style="display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 8px; font-size: 2.2rem;">
                <input type="radio" id="star5" name="rating" value="5" /><label for="star5" style="cursor:pointer;">★</label>
                <input type="radio" id="star4" name="rating" value="4" /><label for="star4" style="cursor:pointer;">★</label>
                <input type="radio" id="star3" name="rating" value="3" /><label for="star3" style="cursor:pointer;">★</label>
                <input type="radio" id="star2" name="rating" value="2" /><label for="star2" style="cursor:pointer;">★</label>
                <input type="radio" id="star1" name="rating" value="1" required /><label for="star1" style="cursor:pointer;">★</label>
            </div>
        </div>

        <div style="margin-bottom: 32px;">
            <label style="display: block; font-family: var(--font-mono) !important; font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;">
                Review Details (Optional)
            </label>
            <textarea name="review" placeholder="Describe lighting, police presence, or general feel of the area (optional)..." style="width: 100%; height: 140px; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font-main); font-size: 0.85rem; background: var(--bg); color: var(--ink); outline: none;"></textarea>
        </div>

        <button type="submit" class="btn-predict" style="width: 100%; padding: 16px; background: var(--orange); color: var(--white); border: none; border-radius: 10px; font-family: var(--font-mono) !important; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 20px rgba(255,107,53,0.3); display: flex; align-items: center; justify-content: center; gap: 12px;">
            <i class="fas fa-paper-plane"></i> Submit Analysis
        </button>
    </form>
</div>

<style>
    /* CONTENT ANIMATION */
    @keyframes contentIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* STAR RATING LOGIC */
    .star-rating input { display: none; }
    .star-rating label { color: #ffe4d0; transition: color 0.2s, transform 0.2s; }
    .star-rating label:hover { transform: scale(1.1); }
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: var(--orange); }

    /* FORM FOCUS STATES */
    select:focus, textarea:focus { 
        border-color: var(--orange) !important; 
        box-shadow: 0 0 0 3px rgba(255,107,53,0.1) !important;
    }
</style>

{% endblock %}
