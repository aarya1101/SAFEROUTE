{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHO Registration | SafeRoute</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <style>
    :root {
      --bg: #fff9f5;
      --white: #ffffff;
      --ink: #1a1a2e;
      --ink2: #2d2d4e;
      --muted: #888888;
      --border: #ffe4d0;
      --orange: #ff6b35;
      --orange-dk: #e85520;
      --orange-lt: #fff5f0;
      --teal: #0d9488;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --green: #10b981;
      --gold-text: #f7c59f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Grid Background Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: -1;
    }

    .form-container {
      width: 100%;
      max-width: 540px;
      position: relative;
    }

    .form-box {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.04);
      animation: fadeIn 0.38s ease;
    }

    /* Typography */
    h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: -1.5px;
      color: var(--ink);
      text-align: center;
      margin-bottom: 8px;
    }

    .form-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dk));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .brand-text {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: var(--ink);
    }

    .role-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--orange);
      background: var(--orange-lt);
      padding: 4px 12px;
      border-radius: 4px;
      display: table;
      margin: 0 auto 20px;
      text-transform: uppercase;
    }

    /* Progress Indicators */
    .progress-steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      position: relative;
    }

    .step-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--white);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      transition: all 0.3s ease;
    }

    .step-indicator.active .step-dot {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
    }

    .step-indicator.completed .step-dot {
      background: var(--teal);
      border-color: var(--teal);
      color: var(--white);
    }

    .step-label {
      margin-top: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .step-indicator.active .step-label { color: var(--ink); }

    /* Inputs */
    .input-group { margin-bottom: 20px; }

    .input-group label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-box {
      display: flex;
      align-items: center;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      height: 52px;
      transition: all 0.2s ease;
    }

    .input-box:focus-within {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    }

    .input-box input, .input-box select {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
    }

    .input-box .icon {
      color: var(--muted);
      font-size: 18px;
      margin-right: 12px;
      display: flex;
    }

    /* Buttons */
    .btn-next, .btn-submit {
      background: var(--ink);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .btn-next:hover, .btn-submit:hover {
      background: var(--orange);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-prev {
      background: var(--white);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 14px 24px;
      border-radius: 10px;
    }

    .btn-prev:hover:not(:disabled) {
      border-color: var(--ink);
      color: var(--ink);
    }

    .liveness-btn {
      width: 100%;
      height: 60px;
      background: var(--orange-lt);
      border: 2px dashed var(--orange);
      border-radius: 12px;
      color: var(--orange);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .liveness-btn.captured {
      background: #f0fdf4;
      border: 2px solid var(--green);
      color: var(--green);
    }

    .modal-content {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
    }

    .modal-header { border-bottom: 1px solid var(--border); }
    .modal-title { font-weight: 700; letter-spacing: -1px; }

    .form-footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .form-footer a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-step { display: none; animation: fadeIn 0.4s ease; }
    .form-step.active { display: block; }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-box">
      <div class="brand">
        <div class="brand-icon">
          <ion-icon name="shield-checkmark"></ion-icon>
        </div>
        <span class="brand-text">SAFE ROUTE</span>
      </div>
      
      <span class="role-tag">Official SHO Portal</span>
      
      <h2>Registration</h2>
      <p class="form-subtitle">Identity verification for administrative access.</p>

      <div class="progress-steps">
        <div class="step-indicator active" data-step="0">
          <div class="step-dot">01</div>
          <span class="step-label">Account</span>
        </div>
        <div class="step-indicator" data-step="1">
          <div class="step-dot">02</div>
          <span class="step-label">Station</span>
        </div>
        <div class="step-indicator" data-step="2">
          <div class="step-dot">03</div>
          <span class="step-label">Verify</span>
        </div>
      </div>

      <form id="signup-form" method="POST" action="{% url 'signup_sho' %}" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-step active">
          <div class="input-group">
            <label>Official Email</label>
            <div class="input-box">
              <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
              <input type="email" name="email" placeholder="name@police.gov.in" required>
            </div>
          </div>
          <div class="input-group">
            <label>Username</label>
            <div class="input-box">
              <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
              <input type="text" name="username" placeholder="Select unique ID" required>
            </div>
          </div>
          <div class="input-group">
            <label>Password</label>
            <div class="input-box">
              <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
              <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
          </div>
        </div>

        <div class="form-step">
          <div class="input-group">
            <label>Police Station</label>
            <div class="input-box">
              <span class="icon"><ion-icon name="business-outline"></ion-icon></span>
              <select name="station" required>
                <option value="" disabled selected>Select assigned station</option>
                {% for station in stations %}
                  <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="input-group">
            <label>Badge Number</label>
            <div class="input-box">
              <span class="icon"><ion-icon name="id-card-outline"></ion-icon></span>
              <input type="text" name="badge_id" placeholder="Enter Official Badge ID" required>
            </div>
          </div>
        </div>

        <div class="form-step">
          <div class="input-group">
            <label>Liveness Check</label>
            <button type="button" id="start-btn" class="liveness-btn" data-bs-toggle="modal" data-bs-target="#cameraModal">
              <ion-icon name="videocam"></ion-icon>
              Open Verification Camera
            </button>
          </div>
          <input type="hidden" id="liveness_video" name="liveness_video" required>
          <input type="hidden" id="liveness_frame" name="liveness_frame" required>
        </div>

        <div class="d-flex gap-3 mt-4">
          <button type="button" id="prev-btn" class="btn-prev" disabled>BACK</button>
          <button type="button" id="next-btn" class="btn-next">NEXT STEP</button>
          <button type="submit" id="submit-btn" class="btn-submit" style="display:none;">COMPLETE REGISTER</button>
        </div>
      </form>

      <div class="form-footer">
        <p class="mb-0" style="font-size: 0.8rem; color: var(--muted);">
          Already have an account? <a href="{% url 'login' %}">Sign In →</a>
        </p>
      </div>
    </div>
  </div>

  <div class="modal fade" id="cameraModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title font-monospace" style="font-size: 0.8rem;">IDENTITY_VERIFICATION_V1</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center p-4">
          <video id="live-video" autoplay muted playsinline style="width:100%; border-radius:12px; background:#000;"></video>
          <button id="record-btn" class="btn-next mt-3">START RECORDING</button>
          <div id="recording-message" class="mt-2 text-success font-monospace" style="display:none; font-size: 0.7rem;">✓ CAPTURE_SUCCESS</div>
          <canvas id="frame-canvas" style="display:none;"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const steps = document.querySelectorAll('.form-step');
    const stepIndicators = document.querySelectorAll('.step-indicator');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const submitBtn = document.getElementById('submit-btn');
    let current = 0;

    function showStep(n) {
      steps.forEach((s, i) => s.classList.toggle('active', i === n));
      stepIndicators.forEach((ind, i) => {
        ind.classList.toggle('active', i === n);
        ind.classList.toggle('completed', i < n);
      });
      prevBtn.disabled = (n === 0);
      if (n === steps.length - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'flex';
      } else {
        nextBtn.style.display = 'flex';
        submitBtn.style.display = 'none';
      }
    }

    nextBtn.addEventListener('click', () => { current++; showStep(current); });
    prevBtn.addEventListener('click', () => { current--; showStep(current); });
  </script>
</body>
</html>
